<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your Vintus Performance account password.">
    <title>Forgot Password | Vintus Performance</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3EV%3C/text%3E%3C/svg%3E">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css?v=2">
    <link rel="stylesheet" href="css/login.css?v=2">
</head>
<body class="login-page" style="background: #000 !important;">
    <!-- Minimal Navigation — logo only -->
    <nav style="justify-content: center;">
        <a href="/" class="logo"><img src="images/VintusBlankLogo.jpeg" alt="Vintus Performance" class="logo-img"></a>
    </nav>

    <!-- Forgot Password Section -->
    <section class="login-section">
        <div class="login-card">
            <h1>Forgot Password</h1>
            <p class="login-subtitle">Enter your email to receive a reset link</p>

            <div class="login-error" id="formError"></div>

            <div id="successMsg" style="display:none; background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: #4ade80; padding: 0.75rem 1rem; font-size: 0.9rem; margin-bottom: 1.5rem; text-align: center;">
                If an account exists with that email, we've sent a reset link.
            </div>

            <form id="forgotForm">
                <div class="login-field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@email.com" required autocomplete="email">
                </div>
                <button type="submit" class="login-submit" id="submitBtn">
                    <span class="login-submit-text">Send Reset Link</span>
                </button>
            </form>

            <div class="login-footer-links">
                <a href="/login">Back to Login</a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <a href="/" class="footer-logo"><img src="images/VintusBlankLogo.jpeg" alt="Vintus Performance" class="footer-logo-img"></a>
                <ul class="footer-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/features">Services</a></li>
                    <li><a href="/about">About</a></li>
                    <li><a href="/contact">Contact</a></li>
                </ul>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2025 Vintus Performance. Discipline Within, Dominance Beyond.</p>
            </div>
        </div>
    </footer>

    <!-- Scripts (minimal — no nav-auth needed) -->
    <script src="js/config.js?v=2"></script>
    <script src="js/api.js?v=2"></script>
    <script src="js/forgot-password.js?v=1"></script>
</body>
</html>
